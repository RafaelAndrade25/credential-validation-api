server.port=8081
spring.application.name=credentials-validation-api

spring.datasource.url=jdbc:postgresql://localhost:5432/postgres?currentSchema=hpTap
spring.datasource.username=postgres
spring.datasource.password=12345678
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

logging.level.com.helptap.validation=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# Simular latÍncia da API (ms) - opcional
validation.api.simulated-delay=500
